# -- Service commands ----------------------------------------------------------

[service]
not_installed = "[dim]Layanan belum terpasang. Jalankan [bold]ductor service install[/bold].[/dim]"
not_running = "[dim]Layanan tidak berjalan.[/dim]"
no_service = "[dim]Tidak ada layanan yang terpasang.[/dim]"
no_binary = "[bold red]Tidak dapat menemukan biner ductor di PATH.[/bold red]"
removed = "[green]Layanan dihapus.[/green]"
started = "[green]Layanan dimulai.[/green]"
stopped = "[green]Layanan dihentikan.[/green]"
start_failed = "[red]Gagal memulai: {error}[/red]"
stop_failed = "[red]Gagal menghentikan: {error}[/red]"

[service.install]
title = "layanan latar ductor"
body = """\
[bold green]ductor sekarang berjalan sebagai layanan latar.[/bold green]\n
{detail}\n
[bold]Perintah yang berguna:[/bold]\n
  [cyan]ductor service status[/cyan]     Periksa apakah sedang berjalan
  [cyan]ductor service stop[/cyan]       Hentikan layanan
  [cyan]ductor service logs[/cyan]       {logs_hint}
  [cyan]ductor service uninstall[/cyan]  Hapus layanan"""

[service.linux]
no_systemd = "[bold red]systemd tidak ditemukan. Instalasi layanan memerlukan Linux dengan systemd.[/bold red]"
linger_warning = "[bold yellow]Linger harus diaktifkan agar ductor tetap berjalan setelah Anda keluar.[/bold yellow]"
linger_enabled = "[green]Linger diaktifkan.[/green]"
linger_manual = "[yellow]Tidak dapat mengaktifkan linger secara otomatis.[/yellow]\nJalankan secara manual: [bold]sudo loginctl enable-linger {user}[/bold]"
start_failed = "[bold red]Gagal memulai layanan:[/bold red] {error}"
detail = "Dimulai saat boot dan restart saat crash."

[service.macos]
no_launchctl = "[bold red]launchctl tidak ditemukan. Instalasi layanan memerlukan macOS.[/bold red]"
start_failed = "[bold red]Gagal memuat Launch Agent:[/bold red] {error}"
detail = "Dimulai saat login dan restart saat crash (throttle 10 detik)."
unload_failed = "[red]Gagal membongkar agent: {error}[/red]"
not_loaded = "[red]Agent tidak dimuat. Coba: [bold]ductor service install[/bold][/red]"

[service.windows]
admin_title = "[bold yellow]Hak Administrator Diperlukan[/bold yellow]"
admin_body = """\
[bold yellow]Diperlukan hak administrator.[/bold yellow]\n
Buka terminal sebagai Administrator dan coba lagi:\n
  [bold]1.[/bold] Klik kanan pada CMD atau PowerShell
  [bold]2.[/bold] Pilih [cyan]'Jalankan sebagai administrator'[/cyan]
  [bold]3.[/bold] Jalankan: [cyan]ductor service install[/cyan]"""
no_scheduler = "[bold red]Task Scheduler tidak tersedia. Instalasi layanan memerlukan Windows.[/bold red]"
no_pythonw = "[dim]Catatan: pythonw.exe tidak ditemukan. Jendela konsol mungkin terlihat.[/dim]"
create_failed = "[bold red]Gagal membuat tugas terjadwal:[/bold red] {error}"
start_failed = "[bold red]Tugas dibuat tetapi gagal dimulai:[/bold red] {error}"
remove_failed = "[red]Gagal menghapus tugas: {error}[/red]"
detail = "Dimulai 10 detik setelah login dan restart saat crash (hingga 3 percobaan, interval 1 menit)."
query_failed = "[red]Tidak dapat menanyakan status tugas: {error}[/red]"

[service.logs]
no_logs = "[dim]Tidak ada file log yang ditemukan.[/dim]"
showing = "[dim]Menampilkan {count} baris terakhir dari {name}[/dim]"
read_error = "[red]Tidak dapat membaca file log: {error}[/red]"
full_path = "[dim]Log lengkap: {path}[/dim]"
not_installed = "[dim]Layanan belum terpasang.[/dim]"
streaming = "[dim]Menampilkan log (Ctrl+C untuk berhenti)...[/dim]"
no_journalctl = "[bold red]journalctl tidak ditemukan.[/bold red]"

# -- API commands --------------------------------------------------------------

[api]
title = "[bold]Perintah API[/bold] [dim](beta)[/dim]"
status_not_configured = "[dim]belum dikonfigurasi[/dim]"
status_enabled = "[green]aktif[/green] (port {port})"
status_disabled = "[dim]nonaktif[/dim]"

[api.missing_dep]
title = "[bold]Dependensi tidak ditemukan[/bold]"
body = """\
[bold yellow]PyNaCl diperlukan untuk server API (enkripsi E2E).[/bold yellow]\n
Pasang dengan:\n
  [bold]{hint}[/bold]\n
Kemudian jalankan [bold]ductor api enable[/bold] lagi."""

[api.enabled]
title = "[bold]Server API[/bold] [dim](beta)[/dim]"
body = """\
[bold green]Server API diaktifkan.[/bold green]\n
  Host:   [cyan]{host}[/cyan]
  Port:   [cyan]{port}[/cyan]
  Token:  [cyan]{token}[/cyan]\n
[dim]Restart bot untuk memulai server API.[/dim]
[dim]Dirancang untuk digunakan dengan Tailscale atau jaringan privat lainnya.[/dim]"""

[api.disabled]
status = "Server API: [dim]nonaktif[/dim]"

