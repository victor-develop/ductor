# Indonesian CLI strings (Rich-formatted, shown in terminal).

# -- Status command ------------------------------------------------------------

[status]
running = "[bold green]Berjalan[/bold green]  pid={pid}  uptime: {uptime}"
not_running = "[dim]Tidak berjalan[/dim]"
provider = "Provider:  [cyan]{provider}[/cyan] ({model})"
docker_enabled = "Docker:    [green]aktif[/green] ({name})"
docker_disabled = "Docker:    [dim]nonaktif[/dim]"
errors_found = "Kesalahan: [bold red]{count}[/bold red] di log terbaru"
errors_none = "Kesalahan: [green]0[/green]"
paths_header = "[bold]Path:[/bold]"
not_configured = "[bold yellow]Belum dikonfigurasi.[/bold yellow]\n\nJalankan [bold]ductor[/bold] untuk memulai wizard pengaturan."

# -- Config validation ---------------------------------------------------------

[config]
incomplete = "[bold yellow]Konfigurasi tidak lengkap. Jalankan [bold]ductor onboarding[/bold].[/bold yellow]"
matrix_no_homeserver = "[bold yellow]URL homeserver Matrix diperlukan.{hint}[/bold yellow]"
matrix_no_user = "[bold yellow]user_id Matrix diperlukan.{hint}[/bold yellow]"
matrix_no_auth = "[bold yellow]Kata sandi atau access_token Matrix diperlukan.{hint}[/bold yellow]"
matrix_no_target = "[bold yellow]Setidaknya satu allowed_room atau allowed_user diperlukan.{hint}[/bold yellow]"
onboarding_hint = " Jalankan [bold]ductor onboarding[/bold] untuk mengonfigurasi ulang."

# -- Lifecycle -----------------------------------------------------------------

[lifecycle]
stopping_docker = "[dim]Menghentikan kontainer Docker '{name}'...[/dim]"
docker_stopped = "[green]Kontainer Docker dihentikan.[/green]"
stopping_bot = "[dim]Menghentikan bot (pid={pid})...[/dim]"
bot_stopped = "[green]Bot dihentikan.[/green]"
killed_extra = "[dim]Mematikan {count} proses ductor yang tersisa.[/dim]"
no_instance = "[dim]Tidak ada instance bot yang berjalan.[/dim]"

[lifecycle.uninstall]
title = "[bold red]Hapus Instalasi ductor[/bold red]"
body = """\
[bold red]Ini akan menghapus ductor secara permanen dari sistem Anda.[/bold red]\n
  1. Hentikan bot yang berjalan (jika aktif)
  2. Hapus kontainer dan image Docker (jika digunakan)
  3. Hapus semua data di ~/.ductor/
  4. Hapus instalasi paket ductor"""
confirm = "Apakah Anda yakin ingin menghapus segalanya?"
cancelled = "[dim]Penghapusan instalasi dibatalkan.[/dim]"
removing_image = "[dim]Menghapus image Docker '{image}'...[/dim]"
image_removed = "[green]Image Docker dihapus.[/green]"
uninstalling = "[dim]Menghapus instalasi paket ductor...[/dim]"
delete_warning = "[yellow]Peringatan: Tidak dapat menghapus sepenuhnya {home} (beberapa file mungkin terkunci). Hapus secara manual.[/yellow]"
deleted = "[green]Dihapus {home}[/green]"
done_title = "[bold green]Selamat Tinggal[/bold green]"
done_body = "[bold green]ductor telah dihapus sepenuhnya.[/bold green]\n\nTerima kasih telah menggunakan ductor!"

[lifecycle.upgrade]
dev_title = "[bold yellow]Instalasi Pengembangan[/bold yellow]"
dev_body = """\
[bold yellow]Berjalan dari kode sumber (editable install).[/bold yellow]\n
Pembaruan mandiri tidak tersedia.
Perbarui dengan [bold]git pull[/bold] di direktori proyek Anda."""
title = "[bold cyan]Memperbarui ductor...[/bold cyan]"
body = """\
  1. Hentikan bot yang berjalan dengan baik
  2. Perbarui ke versi terbaru
  3. Restart"""
upgrading = "[dim]Memperbarui paket...[/dim]"
complete = "[green]Pembaruan selesai: {old} -> {new}[/green]"
unchanged = "[bold yellow]Versi tidak berubah setelah pembaruan ({version}).[/bold yellow]\nPercobaan ulang otomatis dilakukan, tetapi versi baru yang terpasang belum dapat diverifikasi."
restarting = "[dim]Memulai ulang...[/dim]"

