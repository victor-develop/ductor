# Indonesian chat strings (Markdown-formatted, sent to Telegram/Matrix/API).

# -- Session management -------------------------------------------------------

[session]
error_header = "**Error Sesi**"
error_body = """\
[{model}] Terjadi kesalahan.
Sesi Anda telah disimpan -- kirim pesan lain untuk mencoba lagi.
Gunakan /new untuk memulai sesi baru jika masalah berlanjut."""
error_cause = "**Penyebab:** {hint}"
error_detail = "**Detail:** `{detail}`"
error_auth = "Autentikasi gagal. Silakan autentikasi ulang CLI (misalnya `codex auth` atau periksa API key Anda)."
error_rate = "Batas permintaan tercapai. Tunggu sebentar dan coba lagi."
error_context = "Panjang konteks terlampaui. Gunakan /new untuk memulai sesi baru."

reset_header = "**Sesi Direset**"
reset_body = """\
Sesi direset untuk {provider} di obrolan ini saja.
Sesi provider lain tetap disimpan.
Kirim pesan untuk melanjutkan."""

age_warning = "[Sesi telah berjalan selama {age}. Gunakan /new untuk memulai ulang.]"

empty_turn = "_(Agen memperbarui memori secara diam-diam — kirim pesan lain untuk melanjutkan.)_"

recovered = "_Sesi sebelumnya tidak dapat dipulihkan. Sesi baru dimulai secara otomatis._"
recovery_failed = "Could not recover your session after a fresh start. Please try again or use /new to start over."
sigkill = "Eksekusi terganggu. Silakan kirim permintaan yang sama lagi."

not_found = "Sesi '{name}' tidak ditemukan."
ended = "Sesi '{name}' telah berakhir. Mulai yang baru dengan /session."
still_running = "Sesi '{name}' masih diproses. Tunggu atau gunakan /stop untuk membatalkan."

# -- Stop/interrupt ------------------------------------------------------------

[stop]
header = "**Agen Dihentikan**"
killed = "{provider} dihentikan. Semua pesan dalam antrean dibuang."
nothing = "Tidak ada yang sedang berjalan."

[interrupt]
done = "Menghentikan {count} proses."
nothing = "Tidak ada proses aktif."

[abort_all]
done = "Menghentikan {count} proses di semua agen."
nothing = "Tidak ada proses aktif yang ditemukan di agen mana pun."

# -- Timeout -------------------------------------------------------------------

[timeout]
error_header = "**Waktu Habis**"
error_body = """\
[{model}] CLI dihentikan setelah {minutes} menit.
Sesi Anda telah disimpan -- kirim pesan lain untuk melanjutkan dari terakhir kali.
Gunakan /new untuk memulai sesi baru."""

result_header = "**Waktu Habis**"
result_body = """\
Agen kehabisan waktu setelah {elapsed} detik (batas: {configured} detik).
Coba prompt yang lebih pendek, atau tanyakan dalam langkah-langkah kecil."""

warning_minutes = "Waktu habis dalam {mins} menit"
warning_seconds = "Waktu habis dalam {secs} detik"
extended = "Waktu diperpanjang (+{secs} detik, sisa {remaining})"

generic = "Agen kehabisan waktu. Silakan coba lagi."

