btn_know = "Ayo saling mengenal!"
btn_system = "Lihat sistemnya!"
btn_who = "Siapa kamu? Siapa aku?"

prompt_know = """\
Hei, saya baru menyiapkan ductor.dev dan ingin kamu mengenalku. \
Tanyakan semua yang perlu kamu tahu agar kita bisa bekerja sama dengan baik -- \
namaku, apa yang kulakukan, apa yang sedang kukerjakan, bagaimana aku suka berkomunikasi. \
Simpan apa yang kamu pelajari ke memorimu."""
prompt_system = """\
Lihat-lihat sistem tempat kamu berjalan. \
Periksa OS, alat yang terpasang, folder proyek, apa pun yang menarik. \
Berikan ringkasan singkat tentang apa yang kamu temukan."""
prompt_who = """\
Mari mulai! Perkenalkan dirimu -- siapa kamu, apa yang bisa kamu lakukan untukku? \
Kemudian tanya siapa aku dan apa yang perlu kubantuan."""

