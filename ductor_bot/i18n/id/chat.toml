# -- Gemini warning ------------------------------------------------------------

[gemini]
missing_key = """\
Gemini diatur ke mode autentikasi API key, tetapi `gemini_api_key` di \
`~/.ductor/config/config.json` bernilai `"null"` atau kosong.
Mengapa ini diperlukan: ketika ductor memanggil Gemini CLI sebagai proses eksternal, \
Gemini CLI tidak mengekspos API key yang dimasukkan secara internal kepada pemanggil tersebut.
Atur API key yang valid di `gemini_api_key` dan restart `ductor`."""

