# Strings de CLI em Português (Rich-formatadas, exibidas no terminal).

# -- Comando de status ---------------------------------------------------------

[status]
running = "[bold green]Rodando[/bold green]  pid={pid}  tempo ativo: {uptime}"
not_running = "[dim]Não está rodando[/dim]"
provider = "Provider:  [cyan]{provider}[/cyan] ({model})"
docker_enabled = "Docker:    [green]habilitado[/green] ({name})"
docker_disabled = "Docker:    [dim]desabilitado[/dim]"
errors_found = "Erros:     [bold red]{count}[/bold red] no último log"
errors_none = "Erros:     [green]0[/green]"
paths_header = "[bold]Caminhos:[/bold]"
not_configured = "[bold yellow]Não configurado.[/bold yellow]\n\nExecute [bold]ductor[/bold] para iniciar o assistente de configuração."

# -- Validação de config -------------------------------------------------------

[config]
incomplete = "[bold yellow]Config está incompleta. Execute [bold]ductor onboarding[/bold].[/bold yellow]"
matrix_no_homeserver = "[bold yellow]URL do homeserver Matrix é obrigatória.{hint}[/bold yellow]"
matrix_no_user = "[bold yellow]user_id do Matrix é obrigatório.{hint}[/bold yellow]"
matrix_no_auth = "[bold yellow]Senha ou access_token do Matrix é obrigatório.{hint}[/bold yellow]"
matrix_no_target = "[bold yellow]Pelo menos um allowed_room ou allowed_user é obrigatório.{hint}[/bold yellow]"
onboarding_hint = " Execute [bold]ductor onboarding[/bold] para reconfigurar."

# -- Ciclo de vida -------------------------------------------------------------

[lifecycle]
stopping_docker = "[dim]Parando container Docker '{name}'...[/dim]"
docker_stopped = "[green]Container Docker parado.[/green]"
stopping_bot = "[dim]Parando bot (pid={pid})...[/dim]"
bot_stopped = "[green]Bot parado.[/green]"
killed_extra = "[dim]{count} processo(s) ductor restante(s) encerrado(s).[/dim]"
no_instance = "[dim]Nenhuma instância do bot em execução encontrada.[/dim]"

[lifecycle.uninstall]
title = "[bold red]Desinstalar ductor[/bold red]"
body = """\
[bold red]Isso vai remover permanentemente o ductor do seu sistema.[/bold red]\n
  1. Parar o bot em execução (se ativo)
  2. Remover container e imagem Docker (se utilizado)
  3. Excluir todos os dados em ~/.ductor/
  4. Desinstalar o pacote ductor"""
confirm = "Tem certeza de que deseja desinstalar tudo?"
cancelled = "[dim]Desinstalação cancelada.[/dim]"
removing_image = "[dim]Removendo imagem Docker '{image}'...[/dim]"
image_removed = "[green]Imagem Docker removida.[/green]"
uninstalling = "[dim]Desinstalando pacote ductor...[/dim]"
delete_warning = "[yellow]Aviso: Não foi possível excluir completamente {home} (alguns arquivos podem estar bloqueados). Remova manualmente.[/yellow]"
deleted = "[green]{home} excluído[/green]"
done_title = "[bold green]Até logo[/bold green]"
done_body = "[bold green]ductor foi completamente removido.[/bold green]\n\nObrigado por usar o ductor!"

[lifecycle.upgrade]
dev_title = "[bold yellow]Instalação de Desenvolvimento[/bold yellow]"
dev_body = """\
[bold yellow]Executando a partir do código-fonte (instalação editável).[/bold yellow]\n
Self-upgrade não está disponível.
Atualize com [bold]git pull[/bold] no diretório do projeto."""
title = "[bold cyan]Atualizando ductor...[/bold cyan]"
body = """\
  1. Parar bot em execução de forma graceful
  2. Atualizar para a versão mais recente
  3. Reiniciar"""
upgrading = "[dim]Atualizando pacote...[/dim]"
complete = "[green]Upgrade concluído: {old} -> {new}[/green]"
unchanged = "[bold yellow]Versão inalterada após upgrade ({version}).[/bold yellow]\nTentativa automática foi realizada, mas nenhuma nova versão instalada pôde ser verificada ainda."
restarting = "[dim]Reiniciando...[/dim]"

# -- Comandos Docker -----------------------------------------------------------

[docker]
config_not_found = "[bold red]Config não encontrada. Execute ductor primeiro.[/bold red]"
config_read_error = "[bold red]Falha ao ler config.[/bold red]"
enabled = "Docker sandboxing: [green]habilitado[/green]"
disabled = "Docker sandboxing: [dim]desabilitado[/dim]"
restart_hint = "[dim]Reinicie o bot para aplicar.[/dim]"

[docker.rebuild]
stopping = "[dim]Parando bot...[/dim]"
removing_container = "[dim]Removendo container '{name}'...[/dim]"
removing_image = "[dim]Removendo imagem '{name}'...[/dim]"
done = "[green]Pronto.[/green] A imagem será reconstruída na próxima inicialização do bot.\n[dim]Se instalado como serviço, ele reiniciará automaticamente.[/dim]"

[docker.mount]
usage = "[bold red]Uso: ductor docker mount <caminho>[/bold red]"
not_exist = "[bold red]Caminho não existe: {path}[/bold red]"
not_dir = "[bold red]Não é um diretório: {path}[/bold red]"
already = "[dim]Já montado: {path}[/dim]"
done = "[green]Montado:[/green] {path}{target}"
apply_hint = "[dim]Reinicie o bot (ou reconstrua o container) para aplicar.[/dim]"

[docker.unmount]
usage = "[bold red]Uso: ductor docker unmount <caminho>[/bold red]"
not_found = "[bold red]Mount não encontrado: {path}[/bold red]"
done = "[green]Desmontado:[/green] {path}"

[docker.mounts]
empty = "[dim]Nenhum mount configurado.[/dim]"
add_hint = "[dim]Use 'ductor docker mount <caminho>' para adicionar.[/dim]"

[docker.extras]
col_package = "Pacote"
col_description = "Descrição"
col_status = "Status"
selected = "[green]selecionado[/green]"
not_selected = "[dim]—[/dim]"
apply_hint = "[dim]Execute 'ductor docker rebuild' para aplicar os extras selecionados à imagem.[/dim]"
add_hint = "[dim]Use 'ductor docker extras-add <id>' para adicionar.[/dim]"
remove_hint = "[dim]Use 'ductor docker extras-remove <id>' para remover.[/dim]"
usage_add = "[bold red]Uso: ductor docker extras-add <id>[/bold red]"
usage_remove = "[bold red]Uso: ductor docker extras-remove <id>[/bold red]"
see_ids = "[dim]Execute 'ductor docker extras' para ver IDs disponíveis.[/dim]"
see_installed = "[dim]Execute 'ductor docker extras' para ver IDs instalados.[/dim]"
unknown = "[bold red]Extra desconhecido: {id}[/bold red]"
already_installed = "[dim]Já instalado: {id}[/dim]"
not_installed = "[bold red]Não instalado: {id}[/bold red]"
added = "[green]Adicionado:[/green] {names}"
auto_deps = "[dim]Dependências adicionadas automaticamente: {names}[/dim]"
removed = "[green]Removido:[/green] {name}"
rebuild_hint = "[yellow]Execute 'ductor docker rebuild' para aplicar.[/yellow]"
dep_warning = "[yellow]Aviso: {dependents} dependem de {name}.[/yellow]"

# -- Comandos de serviço -------------------------------------------------------

[service]
not_installed = "[dim]Serviço não instalado. Execute [bold]ductor service install[/bold].[/dim]"
not_running = "[dim]Serviço não está rodando.[/dim]"
no_service = "[dim]Nenhum serviço instalado.[/dim]"
no_binary = "[bold red]Não foi possível encontrar o binário ductor no PATH.[/bold red]"
removed = "[green]Serviço removido.[/green]"
started = "[green]Serviço iniciado.[/green]"
stopped = "[green]Serviço parado.[/green]"
start_failed = "[red]Falha ao iniciar: {error}[/red]"
stop_failed = "[red]Falha ao parar: {error}[/red]"

[service.install]
title = "Serviço em segundo plano do ductor"
body = """\
[bold green]ductor agora está rodando como serviço em segundo plano.[/bold green]\n
{detail}\n
[bold]Comandos úteis:[/bold]\n
  [cyan]ductor service status[/cyan]     Verificar se está rodando
  [cyan]ductor service stop[/cyan]       Parar o serviço
  [cyan]ductor service logs[/cyan]       {logs_hint}
  [cyan]ductor service uninstall[/cyan]  Remover o serviço"""

[service.linux]
no_systemd = "[bold red]systemd não encontrado. Instalação de serviço requer Linux com systemd.[/bold red]"
linger_warning = "[bold yellow]Linger precisa estar habilitado para que o ductor continue rodando após o logout.[/bold yellow]"
linger_enabled = "[green]Linger habilitado.[/green]"
linger_manual = "[yellow]Não foi possível habilitar linger automaticamente.[/yellow]\nExecute manualmente: [bold]sudo loginctl enable-linger {user}[/bold]"
start_failed = "[bold red]Falha ao iniciar serviço:[/bold red] {error}"
detail = "Inicia no boot e reinicia automaticamente em caso de crash."

[service.macos]
no_launchctl = "[bold red]launchctl não encontrado. Instalação de serviço requer macOS.[/bold red]"
start_failed = "[bold red]Falha ao carregar Launch Agent:[/bold red] {error}"
detail = "Inicia no login e reinicia em caso de crash (throttle de 10s)."
unload_failed = "[red]Falha ao descarregar agente: {error}[/red]"
not_loaded = "[red]Agente não carregado. Tente: [bold]ductor service install[/bold][/red]"

[service.windows]
admin_title = "[bold yellow]Administrador Necessário[/bold yellow]"
admin_body = """\
[bold yellow]Privilégios de administrador necessários.[/bold yellow]\n
Abra um terminal como Administrador e tente novamente:\n
  [bold]1.[/bold] Clique com o botão direito no CMD ou PowerShell
  [bold]2.[/bold] Selecione [cyan]'Executar como administrador'[/cyan]
  [bold]3.[/bold] Execute: [cyan]ductor service install[/cyan]"""
no_scheduler = "[bold red]Agendador de Tarefas não disponível. Instalação de serviço requer Windows.[/bold red]"
no_pythonw = "[dim]Nota: pythonw.exe não encontrado. Uma janela de console pode ficar visível.[/dim]"
create_failed = "[bold red]Falha ao criar tarefa agendada:[/bold red] {error}"
start_failed = "[bold red]Tarefa criada mas falha ao iniciar:[/bold red] {error}"
remove_failed = "[red]Falha ao remover tarefa: {error}[/red]"
detail = "Inicia 10s após o login e reinicia em caso de crash (até 3 tentativas, 1 min de intervalo)."
query_failed = "[red]Não foi possível consultar o status da tarefa: {error}[/red]"

[service.logs]
no_logs = "[dim]Nenhum arquivo de log encontrado.[/dim]"
showing = "[dim]Mostrando últimas {count} linhas de {name}[/dim]"
read_error = "[red]Não foi possível ler arquivo de log: {error}[/red]"
full_path = "[dim]Log completo: {path}[/dim]"
not_installed = "[dim]Serviço não instalado.[/dim]"
streaming = "[dim]Mostrando logs (Ctrl+C para parar)...[/dim]"
no_journalctl = "[bold red]journalctl não encontrado.[/bold red]"

# -- Comandos de API -----------------------------------------------------------

[api]
title = "[bold]Comandos de API[/bold] [dim](beta)[/dim]"
status_not_configured = "[dim]não configurado[/dim]"
status_enabled = "[green]habilitado[/green] (porta {port})"
status_disabled = "[dim]desabilitado[/dim]"

[api.missing_dep]
title = "[bold]Dependência ausente[/bold]"
body = """\
[bold yellow]PyNaCl é necessário para o servidor API (criptografia E2E).[/bold yellow]\n
Instale com:\n
  [bold]{hint}[/bold]\n
Depois execute [bold]ductor api enable[/bold] novamente."""

[api.enabled]
title = "[bold]Servidor API[/bold] [dim](beta)[/dim]"
body = """\
[bold green]Servidor API habilitado.[/bold green]\n
  Host:   [cyan]{host}[/cyan]
  Porta:  [cyan]{port}[/cyan]
  Token:  [cyan]{token}[/cyan]\n
[dim]Reinicie o bot para iniciar o servidor API.[/dim]
[dim]Projetado para uso com Tailscale ou outras redes privadas.[/dim]"""

[api.disabled]
status = "Servidor API: [dim]desabilitado[/dim]"

