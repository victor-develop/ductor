removing_container = "[dim]Container '{name}' wird entfernt...[/dim]"
removing_image = "[dim]Image '{name}' wird entfernt...[/dim]"
done = "[green]Fertig.[/green] Image wird beim nächsten Bot-Start neu gebaut.\n[dim]Falls als Dienst installiert, startet er automatisch neu.[/dim]"

[docker.mount]
usage = "[bold red]Benutzung: ductor docker mount <Pfad>[/bold red]"
not_exist = "[bold red]Pfad existiert nicht: {path}[/bold red]"
not_dir = "[bold red]Kein Verzeichnis: {path}[/bold red]"
already = "[dim]Bereits eingebunden: {path}[/dim]"
done = "[green]Eingebunden:[/green] {path}{target}"
apply_hint = "[dim]Bot neustarten (oder Container neu bauen) zum Anwenden.[/dim]"

[docker.unmount]
usage = "[bold red]Benutzung: ductor docker unmount <Pfad>[/bold red]"
not_found = "[bold red]Mount nicht gefunden: {path}[/bold red]"
done = "[green]Ausgebunden:[/green] {path}"

[docker.mounts]
empty = "[dim]Keine Mounts konfiguriert.[/dim]"
add_hint = "[dim]Mit 'ductor docker mount <Pfad>' hinzufügen.[/dim]"

[docker.extras]
col_package = "Paket"
col_description = "Beschreibung"
col_status = "Status"
selected = "[green]ausgewählt[/green]"
not_selected = "[dim]—[/dim]"
apply_hint = "[dim]'ductor docker rebuild' ausführen, um ausgewählte Extras ins Image zu übernehmen.[/dim]"
add_hint = "[dim]Mit 'ductor docker extras-add <id>' hinzufügen.[/dim]"
remove_hint = "[dim]Mit 'ductor docker extras-remove <id>' entfernen.[/dim]"
usage_add = "[bold red]Benutzung: ductor docker extras-add <id>[/bold red]"
usage_remove = "[bold red]Benutzung: ductor docker extras-remove <id>[/bold red]"
see_ids = "[dim]'ductor docker extras' zeigt verfügbare IDs.[/dim]"
see_installed = "[dim]'ductor docker extras' zeigt installierte IDs.[/dim]"
unknown = "[bold red]Unbekanntes Extra: {id}[/bold red]"
already_installed = "[dim]Bereits installiert: {id}[/dim]"
not_installed = "[bold red]Nicht installiert: {id}[/bold red]"
added = "[green]Hinzugefügt:[/green] {names}"
auto_deps = "[dim]Automatisch hinzugefügte Abhängigkeiten: {names}[/dim]"
removed = "[green]Entfernt:[/green] {name}"
rebuild_hint = "[yellow]'ductor docker rebuild' ausführen zum Anwenden.[/yellow]"
dep_warning = "[yellow]Warnung: {dependents} hängen von {name} ab.[/yellow]"

# -- Service-Befehle -----------------------------------------------------------

[service]
not_installed = "[dim]Dienst nicht installiert. Führe [bold]ductor service install[/bold] aus.[/dim]"
not_running = "[dim]Dienst läuft nicht.[/dim]"
no_service = "[dim]Kein Dienst installiert.[/dim]"
no_binary = "[bold red]ductor-Binary nicht im PATH gefunden.[/bold red]"
removed = "[green]Dienst entfernt.[/green]"
started = "[green]Dienst gestartet.[/green]"
stopped = "[green]Dienst gestoppt.[/green]"
start_failed = "[red]Start fehlgeschlagen: {error}[/red]"
stop_failed = "[red]Stopp fehlgeschlagen: {error}[/red]"

[service.install]
title = "ductor Hintergrund-Dienst"
body = """\
[bold green]ductor läuft jetzt als Hintergrund-Dienst.[/bold green]\n
{detail}\n
[bold]Nützliche Befehle:[/bold]\n
  [cyan]ductor service status[/cyan]     Prüfen ob er läuft
  [cyan]ductor service stop[/cyan]       Dienst stoppen
  [cyan]ductor service logs[/cyan]       {logs_hint}
  [cyan]ductor service uninstall[/cyan]  Dienst entfernen"""

[service.linux]
no_systemd = "[bold red]systemd nicht gefunden. Dienst-Installation benötigt Linux mit systemd.[/bold red]"
linger_warning = "[bold yellow]Linger muss aktiviert sein, damit ductor nach dem Ausloggen weiterläuft.[/bold yellow]"
linger_enabled = "[green]Linger aktiviert.[/green]"
linger_manual = "[yellow]Linger konnte nicht automatisch aktiviert werden.[/yellow]\nManuell ausführen: [bold]sudo loginctl enable-linger {user}[/bold]"
start_failed = "[bold red]Dienst-Start fehlgeschlagen:[/bold red] {error}"
detail = "Startet beim Booten und startet bei Absturz automatisch neu."

[service.macos]
no_launchctl = "[bold red]launchctl nicht gefunden. Dienst-Installation benötigt macOS.[/bold red]"
start_failed = "[bold red]Launch Agent konnte nicht geladen werden:[/bold red] {error}"
detail = "Startet beim Login und startet bei Absturz neu (10s Drosselung)."
unload_failed = "[red]Agent konnte nicht entladen werden: {error}[/red]"
not_loaded = "[red]Agent nicht geladen. Versuche: [bold]ductor service install[/bold][/red]"

[service.windows]
admin_title = "[bold yellow]Administrator erforderlich[/bold yellow]"
admin_body = """\
[bold yellow]Administrator-Rechte erforderlich.[/bold yellow]\n
Öffne ein Terminal als Administrator und versuche es erneut:\n
  [bold]1.[/bold] Rechtsklick auf CMD oder PowerShell
  [bold]2.[/bold] Wähle [cyan]'Als Administrator ausführen'[/cyan]
  [bold]3.[/bold] Ausführen: [cyan]ductor service install[/cyan]"""
no_scheduler = "[bold red]Aufgabenplanung nicht verfügbar. Dienst-Installation benötigt Windows.[/bold red]"
no_pythonw = "[dim]Hinweis: pythonw.exe nicht gefunden. Ein Konsolenfenster könnte sichtbar sein.[/dim]"
create_failed = "[bold red]Geplante Aufgabe konnte nicht erstellt werden:[/bold red] {error}"
start_failed = "[bold red]Aufgabe erstellt, aber Start fehlgeschlagen:[/bold red] {error}"
remove_failed = "[red]Aufgabe konnte nicht entfernt werden: {error}[/red]"
detail = "Startet 10s nach Login und startet bei Absturz neu (bis zu 3 Versuche, 1 Min. Abstand)."
query_failed = "[red]Aufgabenstatus konnte nicht abgefragt werden: {error}[/red]"

[service.logs]
no_logs = "[dim]Keine Log-Dateien gefunden.[/dim]"
showing = "[dim]Zeige letzte {count} Zeilen von {name}[/dim]"
read_error = "[red]Log-Datei konnte nicht gelesen werden: {error}[/red]"
full_path = "[dim]Vollständiges Log: {path}[/dim]"
not_installed = "[dim]Dienst nicht installiert.[/dim]"
streaming = "[dim]Zeige Logs (Strg+C zum Beenden)...[/dim]"
no_journalctl = "[bold red]journalctl nicht gefunden.[/bold red]"

# -- API-Befehle ---------------------------------------------------------------

[api]
title = "[bold]API-Befehle[/bold] [dim](Beta)[/dim]"
status_not_configured = "[dim]nicht konfiguriert[/dim]"
status_enabled = "[green]aktiviert[/green] (Port {port})"
status_disabled = "[dim]deaktiviert[/dim]"

[api.missing_dep]
title = "[bold]Fehlende Abhängigkeit[/bold]"
body = """\
[bold yellow]PyNaCl wird für den API-Server benötigt (E2E-Verschlüsselung).[/bold yellow]\n
Installiere es mit:\n
  [bold]{hint}[/bold]\n
Dann führe [bold]ductor api enable[/bold] erneut aus."""

[api.enabled]
title = "[bold]API Server[/bold] [dim](Beta)[/dim]"
body = """\
[bold green]API-Server aktiviert.[/bold green]\n
  Host:   [cyan]{host}[/cyan]
  Port:   [cyan]{port}[/cyan]
  Token:  [cyan]{token}[/cyan]\n
[dim]Bot neustarten, um den API-Server zu starten.[/dim]
[dim]Designed für Tailscale oder andere private Netzwerke.[/dim]"""

[api.disabled]
status = "API-Server: [dim]deaktiviert[/dim]"

