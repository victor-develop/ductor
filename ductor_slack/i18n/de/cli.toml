# Deutsche CLI-Strings (Rich-formatiert, Terminal-Ausgabe).

# -- Status-Befehl ------------------------------------------------------------

[status]
running = "[bold green]Läuft[/bold green]  pid={pid}  Laufzeit: {uptime}"
not_running = "[dim]Läuft nicht[/dim]"
provider = "Provider:  [cyan]{provider}[/cyan] ({model})"
docker_enabled = "Docker:    [green]aktiviert[/green] ({name})"
docker_disabled = "Docker:    [dim]deaktiviert[/dim]"
errors_found = "Fehler:    [bold red]{count}[/bold red] im letzten Log"
errors_none = "Fehler:    [green]0[/green]"
paths_header = "[bold]Pfade:[/bold]"
not_configured = "[bold yellow]Nicht konfiguriert.[/bold yellow]\n\nFühre [bold]ductor[/bold] aus, um den Setup-Wizard zu starten."

# -- Config-Validierung -------------------------------------------------------

[config]
incomplete = "[bold yellow]Config ist unvollständig. Führe [bold]ductor onboarding[/bold] aus.[/bold yellow]"
matrix_no_homeserver = "[bold yellow]Matrix Homeserver-URL wird benötigt.{hint}[/bold yellow]"
matrix_no_user = "[bold yellow]Matrix user_id wird benötigt.{hint}[/bold yellow]"
matrix_no_auth = "[bold yellow]Matrix Passwort oder access_token wird benötigt.{hint}[/bold yellow]"
matrix_no_target = "[bold yellow]Mindestens ein allowed_room oder allowed_user wird benötigt.{hint}[/bold yellow]"
onboarding_hint = " Führe [bold]ductor onboarding[/bold] aus, um neu zu konfigurieren."

# -- Lifecycle -----------------------------------------------------------------

[lifecycle]
stopping_docker = "[dim]Docker-Container '{name}' wird gestoppt...[/dim]"
docker_stopped = "[green]Docker-Container gestoppt.[/green]"
stopping_bot = "[dim]Bot wird gestoppt (pid={pid})...[/dim]"
bot_stopped = "[green]Bot gestoppt.[/green]"
killed_extra = "[dim]{count} verbleibende ductor-Prozess(e) beendet.[/dim]"
no_instance = "[dim]Keine laufende Bot-Instanz gefunden.[/dim]"

[lifecycle.uninstall]
title = "[bold red]ductor deinstallieren[/bold red]"
body = """\
[bold red]Dies entfernt ductor dauerhaft von deinem System.[/bold red]\n
  1. Laufenden Bot stoppen (falls aktiv)
  2. Docker-Container und Image entfernen (falls genutzt)
  3. Alle Daten in ~/.ductor/ löschen
  4. ductor-Paket deinstallieren"""
confirm = "Bist du sicher, dass du alles deinstallieren möchtest?"
cancelled = "[dim]Deinstallation abgebrochen.[/dim]"
removing_image = "[dim]Docker-Image '{image}' wird entfernt...[/dim]"
image_removed = "[green]Docker-Image entfernt.[/green]"
uninstalling = "[dim]ductor-Paket wird deinstalliert...[/dim]"
delete_warning = "[yellow]Warnung: {home} konnte nicht vollständig gelöscht werden (einige Dateien sind evtl. gesperrt). Bitte manuell entfernen.[/yellow]"
deleted = "[green]{home} gelöscht[/green]"
done_title = "[bold green]Tschüss[/bold green]"
done_body = "[bold green]ductor wurde vollständig entfernt.[/bold green]\n\nDanke, dass du ductor benutzt hast!"

[lifecycle.upgrade]
dev_title = "[bold yellow]Entwicklungs-Installation[/bold yellow]"
dev_body = """\
[bold yellow]Läuft aus dem Quellcode (editierbare Installation).[/bold yellow]\n
Self-Upgrade ist nicht verfügbar.
Aktualisiere mit [bold]git pull[/bold] im Projektverzeichnis."""
title = "[bold cyan]ductor wird aktualisiert...[/bold cyan]"
body = """\
  1. Laufenden Bot ordentlich stoppen
  2. Auf neueste Version aktualisieren
  3. Neustarten"""
upgrading = "[dim]Paket wird aktualisiert...[/dim]"
complete = "[green]Upgrade abgeschlossen: {old} -> {new}[/green]"
unchanged = "[bold yellow]Version unverändert nach Upgrade ({version}).[/bold yellow]\nAutomatischer Retry wurde versucht, aber keine neue Version konnte verifiziert werden."
restarting = "[dim]Neustart...[/dim]"

# -- Docker-Befehle -----------------------------------------------------------

