# English CLI strings (Rich-formatted, shown in terminal).

# -- Status command ------------------------------------------------------------

[status]
running = "[bold green]Running[/bold green]  pid={pid}  uptime: {uptime}"
not_running = "[dim]Not running[/dim]"
provider = "Provider:  [cyan]{provider}[/cyan] ({model})"
docker_enabled = "Docker:    [green]enabled[/green] ({name})"
docker_disabled = "Docker:    [dim]disabled[/dim]"
errors_found = "Errors:    [bold red]{count}[/bold red] in latest log"
errors_none = "Errors:    [green]0[/green]"
paths_header = "[bold]Paths:[/bold]"
not_configured = "[bold yellow]Not configured.[/bold yellow]\n\nRun [bold]ductor-slack[/bold] to start the setup wizard."

# -- Config validation ---------------------------------------------------------

[config]
incomplete = "[bold yellow]Config is incomplete. Run [bold]ductor-slack onboarding[/bold].[/bold yellow]"
matrix_no_homeserver = "[bold yellow]Matrix homeserver URL is required.{hint}[/bold yellow]"
matrix_no_user = "[bold yellow]Matrix user_id is required.{hint}[/bold yellow]"
matrix_no_auth = "[bold yellow]Matrix password or access_token is required.{hint}[/bold yellow]"
matrix_no_target = "[bold yellow]At least one allowed_room or allowed_user is required.{hint}[/bold yellow]"
onboarding_hint = " Run [bold]ductor-slack onboarding[/bold] to reconfigure."

# -- Lifecycle -----------------------------------------------------------------

[lifecycle]
stopping_docker = "[dim]Stopping Docker container '{name}'...[/dim]"
docker_stopped = "[green]Docker container stopped.[/green]"
stopping_bot = "[dim]Stopping bot (pid={pid})...[/dim]"
bot_stopped = "[green]Bot stopped.[/green]"
killed_extra = "[dim]Killed {count} remaining ductor process(es).[/dim]"
no_instance = "[dim]No running bot instance found.[/dim]"

[lifecycle.uninstall]
title = "[bold red]Uninstall ductor-slack[/bold red]"
body = """\
[bold red]This will permanently remove ductor from your system.[/bold red]\n
  1. Stop the running bot (if active)
  2. Remove Docker container and image (if used)
  3. Delete all data in ~/.ductor-slack/
  4. Uninstall the ductor-slack package"""
confirm = "Are you sure you want to uninstall everything?"
cancelled = "[dim]Uninstall cancelled.[/dim]"
removing_image = "[dim]Removing Docker image '{image}'...[/dim]"
image_removed = "[green]Docker image removed.[/green]"
uninstalling = "[dim]Uninstalling ductor-slack package...[/dim]"
delete_warning = "[yellow]Warning: Could not fully delete {home} (some files may be locked). Remove manually.[/yellow]"
deleted = "[green]Deleted {home}[/green]"
done_title = "[bold green]Goodbye[/bold green]"
done_body = "[bold green]ductor has been completely removed.[/bold green]\n\nThank you for using ductor!"

[lifecycle.upgrade]
dev_title = "[bold yellow]Development Install[/bold yellow]"
dev_body = """\
[bold yellow]Running from source (editable install).[/bold yellow]\n
Self-upgrade is not available.
Update with [bold]git pull[/bold] in your project directory."""
title = "[bold cyan]Upgrading ductor...[/bold cyan]"
body = """\
  1. Stop running bot gracefully
  2. Upgrade to latest version
  3. Restart"""
upgrading = "[dim]Upgrading package...[/dim]"
complete = "[green]Upgrade complete: {old} -> {new}[/green]"
unchanged = "[bold yellow]Version unchanged after upgrade ({version}).[/bold yellow]\nAutomatic retry was attempted, but no new installed version could be verified yet."
restarting = "[dim]Restarting...[/dim]"

