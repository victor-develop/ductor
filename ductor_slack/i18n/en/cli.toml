# -- Service commands ----------------------------------------------------------

[service]
not_installed = "[dim]Service not installed. Run [bold]ductor-slack service install[/bold].[/dim]"
not_running = "[dim]Service is not running.[/dim]"
no_service = "[dim]No service installed.[/dim]"
no_binary = "[bold red]Could not find the ductor binary in PATH.[/bold red]"
removed = "[green]Service removed.[/green]"
started = "[green]Service started.[/green]"
stopped = "[green]Service stopped.[/green]"
start_failed = "[red]Failed to start: {error}[/red]"
stop_failed = "[red]Failed to stop: {error}[/red]"

[service.install]
title = "ductor-slack background service"
body = """\
[bold green]ductor-slack is now running as a background service.[/bold green]\n
{detail}\n
[bold]Useful commands:[/bold]\n
  [cyan]ductor-slack service status[/cyan]     Check if it's running
  [cyan]ductor-slack service stop[/cyan]       Stop the service
  [cyan]ductor-slack service logs[/cyan]       {logs_hint}
  [cyan]ductor-slack service uninstall[/cyan]  Remove the service"""

[service.linux]
no_systemd = "[bold red]systemd not found. Service install requires Linux with systemd.[/bold red]"
linger_warning = "[bold yellow]Linger must be enabled so ductor keeps running after you log out.[/bold yellow]"
linger_enabled = "[green]Linger enabled.[/green]"
linger_manual = "[yellow]Could not enable linger automatically.[/yellow]\nRun manually: [bold]sudo loginctl enable-linger {user}[/bold]"
start_failed = "[bold red]Failed to start service:[/bold red] {error}"
detail = "It starts on boot and restarts on crash."

[service.macos]
no_launchctl = "[bold red]launchctl not found. Service install requires macOS.[/bold red]"
start_failed = "[bold red]Failed to load Launch Agent:[/bold red] {error}"
detail = "It starts on login and restarts on crash (10s throttle)."
unload_failed = "[red]Failed to unload agent: {error}[/red]"
not_loaded = "[red]Agent not loaded. Try: [bold]ductor-slack service install[/bold][/red]"

[service.windows]
admin_title = "[bold yellow]Administrator Required[/bold yellow]"
admin_body = """\
[bold yellow]Administrator privileges required.[/bold yellow]\n
Open a terminal as Administrator and try again:\n
  [bold]1.[/bold] Right-click on CMD or PowerShell
  [bold]2.[/bold] Select [cyan]'Run as administrator'[/cyan]
  [bold]3.[/bold] Run: [cyan]ductor-slack service install[/cyan]"""
no_scheduler = "[bold red]Task Scheduler not available. Service install requires Windows.[/bold red]"
no_pythonw = "[dim]Note: pythonw.exe not found. A console window may be visible.[/dim]"
create_failed = "[bold red]Failed to create scheduled task:[/bold red] {error}"
start_failed = "[bold red]Task created but failed to start:[/bold red] {error}"
remove_failed = "[red]Failed to remove task: {error}[/red]"
detail = "It starts 10s after login and restarts on crash (up to 3 retries, 1 min apart)."
query_failed = "[red]Could not query task status: {error}[/red]"

[service.logs]
no_logs = "[dim]No log files found.[/dim]"
showing = "[dim]Showing last {count} lines from {name}[/dim]"
read_error = "[red]Could not read log file: {error}[/red]"
full_path = "[dim]Full log: {path}[/dim]"
not_installed = "[dim]Service not installed.[/dim]"
streaming = "[dim]Showing logs (Ctrl+C to stop)...[/dim]"
no_journalctl = "[bold red]journalctl not found.[/bold red]"

# -- API commands --------------------------------------------------------------

[api]
title = "[bold]API Commands[/bold] [dim](beta)[/dim]"
status_not_configured = "[dim]not configured[/dim]"
status_enabled = "[green]enabled[/green] (port {port})"
status_disabled = "[dim]disabled[/dim]"

[api.missing_dep]
title = "[bold]Missing dependency[/bold]"
body = """\
[bold yellow]PyNaCl is required for the API server (E2E encryption).[/bold yellow]\n
Install it with:\n
  [bold]{hint}[/bold]\n
Then run [bold]ductor-slack api enable[/bold] again."""

[api.enabled]
title = "[bold]API Server[/bold] [dim](beta)[/dim]"
body = """\
[bold green]API server enabled.[/bold green]\n
  Host:   [cyan]{host}[/cyan]
  Port:   [cyan]{port}[/cyan]
  Token:  [cyan]{token}[/cyan]\n
[dim]Restart the bot to start the API server.[/dim]
[dim]Designed for use with Tailscale or other private networks.[/dim]"""

[api.disabled]
status = "API server: [dim]disabled[/dim]"

