status_crashed = "[bold red]crashé[/bold red]"
status_stopped = "[dim]arrêté[/dim]"
empty = "[dim]Aucun sous-agent configuré.[/dim]"
add_hint = "[dim]Utilise 'ductor agents add <nom>' pour en créer un.[/dim]"

[agents.add]
usage = "[bold red]Utilisation : ductor agents add <nom>[/bold red]"
reserved = "[bold red]Le nom 'main' est réservé.[/bold red]"
exists = "[bold red]L'agent '{name}' existe déjà.[/bold red]"
prompt_token = "Token Telegram du bot pour '{name}' :"
prompt_users = "IDs utilisateurs autorisés (séparés par des virgules) :"
prompt_groups = "IDs de groupes autorisés (séparés par des virgules, laisser vide pour aucun) :"
